# 이 자동화 작업의 이름입니다.
name: CI/CD Deploy

# 언제 이 작업을 실행할까요?
on:
  push:
    branches: [ "master" ] # master 브랜치에 코드가 푸시(합쳐질) 때마다 실행됩니다.

jobs:
  deploy:
    # GitHub이 제공하는 가상 컴퓨터(우분투 리눅스)에서 실행합니다.
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub에 올린 내 코드를 가상 컴퓨터로 가져옵니다.
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 가상 컴퓨터에 자바(JDK)를 설치합니다. (내 PC 사양과 맞춰주세요)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven # 빌드 속도를 위해 다운로드한 라이브러리를 저장해둡니다.

      # 3. 메이븐으로 JAR 파일을 빌드합니다. (이때 app.jar가 생성됩니다)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. 빌드된 JAR 파일을 서버로 보냅니다. (SCP 사용)
      - name: Copy JAR via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "target/app.jar" # 빌드된 파일 위치
          target: "/home/woo/ssd/data/app" # 서버의 목적지 폴더
          strip_components: 1 # target 폴더명은 빼고 파일만 전송합니다.

      # 5. 서버에 접속해서 도커 컴포즈로 앱만 재시작합니다. (SSH 사용)
      - name: Restart Spring App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 서버 PC에서 실행될 명령어들입니다.
            cd /home/woo/ssd/data
            docker-compose restart app