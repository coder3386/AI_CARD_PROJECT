<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

    <link rel="stylesheet" th:href="@{/css/main_style.css}">
    <link rel="stylesheet" th:href="@{/css/loginjoin.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>로그인</h2>

        <form th:action="@{/card/login}" method="post">
            <div th:if="${param.error}" class="error-msg">
                아이디 또는 비밀번호가 잘못되었습니다.
            </div>

            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="아이디를 입력해주세요" required>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력해주세요" required>
            </div>

            <button type="submit" class="btn-primary auth-btn">로그인</button>
        </form>

        <div class="auth-links">
            계정이 없으신가요?<br>
            <a th:href="@{/card/join}">회원가입 하러가기</a>
        </div>

        <div class="back-to-main">
            <a th:href="@{/}">&larr; 메인화면으로 돌아가기</a>
        </div>
    </div>
</div>
</body>
</html>
