<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
<h2>회원가입</h2>
<form th:action="@{/card/join}" method="post">
    <div>
        <label>아이디: </label>
        <input type="text" name="loginid" required>
    </div>
    <div>
        <label>비밀번호: </label>
        <input type="password" name="password" required>
    </div>
    <div>
        <label>이름: </label>
        <input type="text" name="name" required>
    </div>
    <button type="submit">가입하기</button>
</form>
<br>
<a th:href="@{/card/login}">이미 계정이 있으신가요? 로그인</a>
</body>
</html>
