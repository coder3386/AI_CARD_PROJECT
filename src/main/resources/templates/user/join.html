<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

    <link rel="stylesheet" th:href="@{/css/main_style.css}">
    <link rel="stylesheet" th:href="@{/css/loginjoin.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>회원가입</h2>

        <form th:action="@{/card/join}" method="post">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="loginid" placeholder="사용할 아이디를 입력해주세요" required>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력해주세요" required>
            </div>

            <div class="form-group">
                <label>이름</label>
                <input type="text" name="name" placeholder="이름을 입력해주세요" required>
            </div>

            <button type="submit" class="btn-primary auth-btn">가입하기</button>
        </form>

        <div class="auth-links">
            이미 계정이 있으신가요?<br>
            <a th:href="@{/card/login}">로그인</a>
        </div>

        <div class="back-to-main">
            <a th:href="@{/}">&larr; 메인화면으로 돌아가기</a>
        </div>
    </div>
</div>
</body>
</html>
