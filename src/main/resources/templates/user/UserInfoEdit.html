<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/main_style.css}">
    <link rel="stylesheet" th:href="@{/css/loginjoin.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>개인정보 수정</h2>

        <form th:action="@{/card/edit}" method="post" id="editForm">
            <div class="form-group">
                <label>아이디</label>
                <p class="user-id-display" th:text="${member.loginId}" style="color: #888;"></p>
            </div>

            <div class="form-group">
                <label>기존 비밀번호
                    <span class="error-text" th:classappend="${error == 'wrong_password'} ? 'show' : ''"
                          id="error-currentPassword">
                비밀번호가 일치하지 않습니다.
            </span>
                </label>
                <input type="password" name="currentPassword" placeholder="본인 확인을 위해 현재 비밀번호를 입력하세요" required
                       th:classappend="${error == 'wrong_password'} ? 'input-error' : ''">
            </div>

            <div class="form-group">
                <label>새 비밀번호 <span class="error-text" id="error-password">필수입력</span></label>
                <input type="password" name="password" placeholder="변경할 비밀번호를 입력하세요">
                <small style="color: #999;">* 변경하지 않으려면 비워두세요.</small>
            </div>

            <div class="form-group">
                <label>휴대폰 번호 <span class="error-text" id="error-phone">양식 확인 요망</span></label>
                <input type="text" name="phone" th:value="${member.phone}" placeholder="010-0000-0000">
            </div>

            <div class="form-group" style="margin-top: 40px; border-top: 1px solid #ddd; padding-top: 25px;">
                <label style="font-weight: bold; font-size: 16px; display: block; margin-bottom: 15px;">구글 서비스 계정 연동 (주소록)</label>

                <div id="ga-status-area">
                    <p th:if="${isGoogleLinked}" style="color: #10b981; font-weight: bold; font-size: 15px; margin: 10px 0;">
                        ✅ 구글 계정 연동이 완료되었습니다.
                    </p>

                    <div th:unless="${isGoogleLinked}" style="margin-top: 5px;">
                        <a th:href="@{/oauth/start}" class="btn-primary auth-btn" style="background-color: #4285F4; color: white; display: inline-flex; align-items: center; justify-content: center; padding: 12px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; min-height: 42px;">
                            Google 계정 연동하기
                        </a>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary auth-btn">수정 완료</button>

            <a th:href="@{/main}" class="back-link" style="display: block; text-align: center;
             margin-top: 15px; color: #7A5C43; text-decoration: none;">
                취소
            </a>
        </form>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);

    const targetPath = /*[[@{/edit}]]*/ "/card/edit";

    if (urlParams.get('linked') === 'success') {
        alert("구글 애널리틱스 계정이 성공적으로 연동되었습니다! ✅");
        // 파라미터만 떼어내고 원래 주소로 복귀
        window.history.replaceState({}, document.title, targetPath);
    }
    else if (urlParams.get('linked') === 'error') {
        alert("연동 과정에서 문제가 발생했습니다. 다시 시도해 주세요. ⚠️");
        window.history.replaceState({}, document.title, targetPath);
    }
</script>
<script th:src="@{/js/UserInfoEdit.js}"></script>
</body>
</html>
