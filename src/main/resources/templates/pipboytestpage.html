<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vault-Tec OS v1.1 - Wasteland Edition</title>
    <style>
        /* 1. 기본 배경 및 폰트 설정 (약간의 갈색톤 추가로 변색 표현) */
        body {
            background-color: #050a05;
            color: #1aff80;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-transform: uppercase;
            /* 글자에도 먼지가 낀 듯한 미세한 번짐 효과 */
            text-shadow: 0 0 5px rgba(26, 255, 128, 0.5), 2px 2px 3px rgba(0, 0, 0, 0.8);
        }

        /* 2. 화면 전체 레이어 (먼지, 지직거림, 변색) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            /* 배경 레이어: 1. 스캔라인, 2. 화면 가장자리 어두운 변색(Vignette), 3. 지저분한 먼지 느낌 */
            background:
                    linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                    radial-gradient(circle, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.7) 100%),
                    url('https://www.transparenttextures.com/patterns/stardust.png'); /* 미세한 먼지 텍스처 */
            z-index: 10;
            background-size: 100% 3px, 100% 100%, auto;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 3. 화면 테두리 찌든 때 효과 (더러운 가장자리) */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* 불규칙한 갈색 얼룩으로 변색 표현 */
            background: radial-gradient(ellipse at center, transparent 50%, rgba(40, 30, 10, 0.4) 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            z-index: 11;
            pointer-events: none;
        }

        /* 4. 화면 깜빡임 애니메이션 (Flicker) */
        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            15% { opacity: 0.92; }
            20% { opacity: 0.99; }
            100% { opacity: 1; }
        }

        .container {
            animation: flicker 0.2s infinite;
            z-index: 1;
            text-align: center;
            /* 살짝 구부러진 CRT 느낌을 위해 아주 미세한 왜곡 */
            transform: scale(1.02);
        }

        /* 5. 로고 및 텍스트 */
        .logo {
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 3px solid #1aff80;
            padding: 10px 20px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(26, 255, 128, 0.3);
        }

        /* 6. 입력창 스타일 */
        .search-container {
            margin-top: 20px;
            position: relative;
        }
        .search-input {
            background: transparent;
            border: none;
            border-bottom: 3px solid #1aff80;
            color: #1aff80;
            font-size: 24px;
            padding: 10px;
            width: 450px;
            outline: none;
            font-family: inherit;
        }

        /* 7. 메뉴 버튼들 */
        .menu {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }
        .menu-item {
            border: 1px solid #1aff80;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(26, 255, 128, 0.05);
        }
        .menu-item:hover {
            background: #1aff80;
            color: #050a05;
            box-shadow: 0 0 20px #1aff80;
        }

        /* 8. 화면 상단 상태바 */
        .status-bar {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #1aff80;
            padding-bottom: 5px;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 화면에 가끔 지나가는 노이즈 줄 */
        .noise-bar {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(26, 255, 128, 0.1);
            top: -10px;
            z-index: 12;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }
    </style>
</head>
<body>

<div class="noise-bar"></div>

<div class="status-bar">
    <span>STAT ● INV ● DATA ● MAP ● RADIO</span>
    <span id="clock">12:00 PM</span>
</div>

<div class="container">
    <div class="logo">PIP-BOY 3000</div>

    <p style="letter-spacing: 2px;">[ VAULT-TEC TERMINAL - UNKNOWN USER ]</p>

    <div class="search-container">
        <span style="font-size: 24px;">></span>
        <input type="text" class="search-input" placeholder="READY TO SEARCH..." autofocus>
    </div>

    <div class="menu">
        <div class="menu-item">STRENGTH</div>
        <div class="menu-item">PERCEPTION</div>
        <div class="menu-item">ENDURANCE</div>
        <div class="menu-item">CHARISMA</div>
    </div>

    <p style="margin-top: 50px; font-size: 10px; opacity: 0.4;">
        WARNING: RADIATION LEAK DETECTED IN SECTOR 7G
    </p>
</div>

<script>
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        document.getElementById('clock').innerText = hours + ':' + minutes + ' ' + ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
