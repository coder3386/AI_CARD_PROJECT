<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Card Main Page</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="box">
    <h1 th:text="${title}">제목</h1>
    <p th:text="${status}">상태 메시지</p>
    <hr>
    <p>Artifact: <strong>cardapp</strong></p>
    <p>Group: <strong>Alcard</strong></p>
    <p>test: <strong>배포테스트2번째</strong></p>
</div>

<div class="box">
    <h1 th:text="${title}">제목</h1>

    <a th:href="@{/pipboy}" class="btn">Pip-Boy 테스트 페이지로 이동</a>
</div>

<style>
    /* 간단한 버튼 디자인 */
    .btn {
        display: inline-block;
        padding: 10px 20px;
        background-color: #00ff00; /* 폴아웃 느낌의 초록색 */
        color: black;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        margin-top: 20px;
    }
    .btn:hover {
        background-color: #008800;
    }
</style>

</body>
</html>
