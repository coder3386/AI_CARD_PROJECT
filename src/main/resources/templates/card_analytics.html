<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명함 조회 통계 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/analytics.css}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        /* 컨트롤러에서 보낸 cardId를 자바스크립트 변수로 치환 */
        const currentCardId = /*[[${cardId}]]*/ 0;
    </script>
    <script src="/card/js/google-analytics-dashboard.js" defer></script>
</head>
<body>

<div class="dashboard-container">
    <div class="header-box">
        <h1>📊 내 명함 실시간 방문 통계</h1>

        <select id="rangeTypeFilter">
            <option value="7days" selected>최근 7일</option>
            <option value="30days">최근 30일</option>
            <option value="1year">최근 1년</option>
        </select>
    </div>

    <div class="chart-wrapper">
        <canvas id="analyticsChartCanvas"></canvas>
    </div>
</div>

</body>
</html>
