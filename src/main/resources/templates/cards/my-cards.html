<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 명함</title>
    <link rel="stylesheet" th:href="@{/css/ai-card.css}">
</head>
<body class="ai-card-page">
<button class="ai-home-button" type="button" data-main-home th:data-home-url="@{/}">메인화면으로 가기</button>

<main class="ai-card-shell">
    <section class="ai-card-form-panel my-card-panel">
        <div class="ai-card-header my-card-header">
            <div>
                <p class="ai-card-kicker">My Cards</p>
                <h1>내 명함</h1>
                <p class="ai-card-description">로그인한 계정으로 만든 명함을 관리합니다.</p>
            </div>
            <a class="ai-card-primary-button" th:href="@{/cards/select-type}">새 명함 만들기</a>
        </div>

        <p th:if="${successMessage}" class="ai-success-message" th:text="${successMessage}">처리되었습니다.</p>

        <div th:if="${cards.isEmpty()}" class="my-card-empty">
        아직 생성한 명함이 없습니다.
        </div>

        <div th:if="${!cards.isEmpty()}" class="my-card-list">
        <article class="my-card-row" th:each="card, iter : ${cards.content}">
                <div class="my-card-number" th:text="${cards.number * cards.size + iter.index + 1}">1</div>
                <div class="my-card-info">
                    <strong th:text="${myCardService.displayTitle(card)}">명함 제목</strong>
                    <span th:text="'public_url: ' + ${card.publicUrl}">public_url</span>
                </div>

                <div class="my-card-actions">
                    <form class="my-card-visibility"
                          th:action="@{/cards/my/{cardId}/visibility(cardId=${card.cardId})}"
                          method="post">
                        <input type="hidden" name="page" th:value="${cards.number}">
                        <button type="submit"
                                name="publicCard"
                                value="true"
                                th:classappend="${card.publicCard} ? ' active' : ''">
                            공개
                        </button>
                        <button type="submit"
                                name="publicCard"
                                value="false"
                                th:classappend="${!card.publicCard} ? ' active' : ''">
                            비공개
                        </button>
                    </form>

                    <a class="my-card-preview-link"
                       th:href="@{/cards/{cardId}/preview(cardId=${card.cardId})}">
                        보기
                    </a>

                    <button class="my-card-qr-button"
                            type="button"
                            th:data-qr-src="@{/cards/my/{cardId}/qr-image(cardId=${card.cardId})}"
                            th:data-qr-title="${myCardService.displayTitle(card)}">
                        QR
                    </button>

                    <a class="my-card-analytics-button"
                       th:href="@{/cards/{cardId}/analytics(cardId=${card.cardId})}">
                        통계
                    </a>

                    <button class="my-card-save-button"
                            type="button"
                            th:onclick="'saveToGoogleContacts(' + ${card.cardId} + ')'"
                            style="background-color: #34A853; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                        주소록 저장
                    </button>

                    <form th:action="@{/cards/my/{cardId}/delete(cardId=${card.cardId})}"
                          method="post"
                          onsubmit="return confirm('이 명함을 삭제하시겠습니까? 삭제 후 복구할 수 없습니다.');">
                        <input type="hidden" name="page" th:value="${cards.number}">
                        <button class="my-card-delete-button" type="submit">삭제</button>
                    </form>
                </div>
            </article>
        </div>

        <nav th:if="${cards.totalPages > 1}" class="my-card-pagination" aria-label="명함 페이지">
            <a th:if="${cards.hasPrevious()}" th:href="@{/cards/my(page=${cards.number - 1})}">이전</a>
            <span th:text="|${cards.number + 1} / ${cards.totalPages}|">1 / 1</span>
            <a th:if="${cards.hasNext()}" th:href="@{/cards/my(page=${cards.number + 1})}">다음</a>
        </nav>
    </section>
</main>

<div id="myCardQrModal" class="my-card-qr-modal" hidden>
    <div class="my-card-qr-dialog" role="dialog" aria-modal="true" aria-labelledby="myCardQrTitle">
        <button class="my-card-qr-close" type="button" data-qr-close aria-label="닫기">X</button>
        <p class="ai-card-kicker">QR Code</p>
        <h2 id="myCardQrTitle" data-qr-title>명함 QR 코드</h2>
        <img data-qr-image src="" alt="명함 QR 코드">
        <a data-qr-open href="#" target="_blank" rel="noopener">이미지 새 창으로 열기</a>
    </div>
</div>

<script th:src="@{/js/card-type-select.js}"></script>
<script>
    (function () {
        const modal = document.getElementById("myCardQrModal");
        if (!modal) {
            return;
        }

        const title = modal.querySelector("[data-qr-title]");
        const image = modal.querySelector("[data-qr-image]");
        const openLink = modal.querySelector("[data-qr-open]");

        document.addEventListener("click", function (event) {
            const qrButton = event.target.closest("[data-qr-src]");
            if (qrButton) {
                const src = qrButton.getAttribute("data-qr-src");
                const cacheSafeSrc = src + (src.includes("?") ? "&" : "?") + "t=" + Date.now();
                title.textContent = (qrButton.getAttribute("data-qr-title") || "명함") + " QR 코드";
                image.src = cacheSafeSrc;
                openLink.href = src;
                modal.hidden = false;
                return;
            }

            if (event.target.closest("[data-qr-close]") || event.target === modal) {
                modal.hidden = true;
                image.src = "";
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape" && !modal.hidden) {
                modal.hidden = true;
                image.src = "";
            }
        });
    })();
</script>
<script>
    function saveToGoogleContacts(cardId) {
        if (!confirm("이 명함을 구글 주소록에 저장하시겠습니까?")) return;

        fetch(`/card/api/contacts/save?cardId=${cardId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        })
            .then(response => {
                if (response.ok) {
                    alert("구글 주소록에 성공적으로 저장되었습니다! ✅");
                } else if (response.status === 401) {
                    alert("인증 실패: 로그인이 필요한 기능입니다.");
                } else {
                    alert("저장 실패. 서버 로그를 확인하세요.");
                }
            });
    }
</script>
</body>
</html>
