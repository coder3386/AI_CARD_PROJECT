<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명함 제작 방식 선택</title>
    <link rel="stylesheet" th:href="@{/css/ai-card.css}">
</head>
<body class="ai-card-page">
<button class="ai-home-button" type="button" data-main-home th:data-home-url="@{/}">메인화면으로 가기</button>

<main class="ai-card-shell">
    <section class="ai-card-form-panel">
        <div class="ai-card-header">
            <p class="ai-card-kicker">AI Digital Business Card</p>
            <h1>명함 제작 방식 선택</h1>
            <p class="ai-card-description">원하는 방식으로 AI 디지털 명함을 제작할 수 있습니다.</p>
        </div>

        <div class="ai-card-form">
            <label>
                개인 GPT API Key
                <input id="personalApiKeyInput" type="password" placeholder="개인 GPT API Key를 입력하세요" autocomplete="off">
            </label>
            <label>
                개인 Gemini API Key
                <input id="personalGeminiApiKeyInput" type="password" placeholder="개인 Gemini API Key를 입력하세요" autocomplete="off">
            </label>
            <p class="ai-error-message" id="apiKeySelectError" hidden>GPT API Key 또는 Gemini API Key 중 하나는 입력해야 합니다.</p>

            <div class="ai-select-actions">
                <button class="ai-card-primary-button" type="button" id="textCardButton" th:data-target-url="@{/cards/new}">
                    텍스트를 통한 명함 제작
                </button>
                <button class="ai-card-secondary-button" type="button" id="drawingCardButton" th:data-target-url="@{/cards/drawing/new}">
                    그림을 통한 명함 제작
                </button>
            </div>
            <a class="ai-card-secondary-button" th:href="@{/cards/my}">내 명함 보기</a>
        </div>
    </section>
</main>
<script th:src="@{/js/card-type-select.js}"></script>
</body>
</html>
