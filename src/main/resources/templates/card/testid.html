<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>명함 상세페이지</title>
    <link rel="stylesheet" href="../cards/testid.css">
</head>
<body>

<div class="business-card" th:if="${card != null}">
    <div class="card-header">
        <div class="profile-img">
            <img th:if="${card.imagePath != null}"
                 src="/images/default.png"
                 alt="프로필" style="width:80px; height:80px; border-radius:50%;">
        </div>
        <div class="header-text">
            <h2 class="name" th:text="${card?.name} ?: '이름 없음'">홍길동</h2>
            <p class="position" th:text="${card?.position} ?: '직함 없음'">백엔드 개발자</p>
        </div>
    </div>

    <div class="card-body">
        <div class="info-item">
            <p><strong>이메일:</strong> <span th:text="${card?.email} ?: '없음'">test@test.com</span></p>
        </div>
        <div class="info-item">
            <p><strong>연락처:</strong> <span th:text="${card?.phone} ?: '없음'">010-0000-0000</span></p>
        </div>
    </div>
</div>

<div class="download-section" style="margin-top: 50px; text-align: center;">
    <a href="../card/download/1"
       style="padding: 10px 20px; background-color: #007bff; color: white; border-radius: 5px;">
        HTML 파일 다운로드
    </a>
</div>


<div th:if="${card == null}">
    <p>명함 정보를 불러올 수 없습니다.</p>
</div>

</body>
</html>
