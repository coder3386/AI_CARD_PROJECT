<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>에러 발생</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/error_style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">


<body>
<div class="bg-circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
<div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

<div class="error-card">
    <div class="error-code " th:text="${error.error_code}">000</div>
    <div class="error-msg" th:text="${error.error_title}">Error_title</div>
    <div class="error-sub" th:text="${error.error_message}">
        Error_description
    </div>
    <a th:href="@{/}" class="btn-home">홈으로 돌아가기</a>
</div>
</body>
</html>
