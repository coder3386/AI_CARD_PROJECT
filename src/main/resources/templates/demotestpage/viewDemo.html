<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interactive Digital Business Card</title>
    <style>
        :root {
            --primary-color: #4ca1af;
            --dark-color: #2c3e50;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 메인 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 380px;
            height: 600px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 화면 공통 스타일 */
        .page {
            display: none; /* 기본적으로 숨김 */
            padding: 30px 20px;
            height: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        .page.active {
            display: block; /* 활성화된 페이지만 표시 */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* [페이지 1: 홈/프로필] */
        .profile-section {
            text-align: center;
            margin-top: 40px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--primary-color);
            margin-bottom: 20px;
            object-fit: cover;
        }

        .name {
            font-size: 26px;
            color: var(--dark-color);
            margin-bottom: 10px;
        }

        .job-title {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .origin-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.8;
            color: #666;
        }

        /* [페이지 2: 경력] */
        .section-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--dark-color);
        }

        .timeline {
            border-left: 2px solid #eee;
            padding-left: 20px;
            margin-left: 10px;
        }

        .timeline-item {
            margin-bottom: 30px;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 5px;
            width: 10px;
            height: 10px;
            background: var(--primary-color);
            border-radius: 50%;
        }

        .time-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .time-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--dark-color);
        }

        .time-desc {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        /* [페이지 3: 연락처] */
        .contact-list {
            margin-top: 20px;
        }

        .btn-contact {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-decoration: none;
            color: var(--dark-color);
            transition: 0.2s;
        }

        .btn-contact:hover {
            background: #eef2f3;
            border-left: 4px solid var(--primary-color);
        }

        .btn-icon {
            font-size: 20px;
            margin-right: 15px;
        }

        /* 하단 내비게이션 바 */
        .nav-bar {
            height: 70px;
            background: #ffffff;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            cursor: pointer;
            text-align: center;
            color: #ccc;
            transition: 0.3s;
            font-size: 12px;
            font-weight: 600;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>

<script>
    function showPage(pageId) {
        // 1. 모든 페이지 숨기기
        const pages = document.querySelectorAll('.page');
        pages.forEach(page => page.classList.remove('active'));

        // 2. 모든 탭 아이콘 비활성화
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => item.classList.remove('active'));

        // 3. 선택한 페이지만 보이기
        document.getElementById(pageId).classList.add('active');

        // 4. 클릭한 탭 아이콘 활성화
        // 클릭 이벤트가 발생한 요소를 찾아 active 클래스 추가
        event.currentTarget.classList.add('active');
    }
</script>
