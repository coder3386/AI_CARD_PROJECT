<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>명함 상세 통계</title>
    <style>
        .ga-analytics-dashboard { padding: 20px; border: 1px solid #ddd; border-radius: 8px; max-width: 400px; margin: 20px auto; font-family: sans-serif; }
        .os-progress-bars p { margin: 10px 0; font-size: 16px; }
        .os-progress-bars span { font-weight: bold; color: #007bff; }
    </style>
</head>`
<body>

<div class="ga-analytics-dashboard">
    <h2>📊 구글 애널리틱스 제공 실시간 통계</h2>
    <p>이 명함의 총 누적 조회수: <strong th:text="${totalViews}">0</strong>회</p>

    <div class="os-progress-bars">
        <p>📱 아이폰 (iOS): <span th:text="${osStats.iOS}">0</span>회</p>
        <p>🤖 갤럭시 (Android): <span th:text="${osStats.Android}">0</span>회</p>
        <p>💻 맥북 (Macintosh): <span th:text="${osStats.Macintosh}">0</span>회</p>
        <p>🪟 윈도우 PC (Windows): <span th:text="${osStats.Windows}">0</span>회</p>
        <p>🌐 기타 기기: <span th:text="${osStats.Other}">0</span>회</p>
    </div> </div> </body>
</html>
