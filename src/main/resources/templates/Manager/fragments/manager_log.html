<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<main th:fragment="logContent" class="manager-center-view">
    <div class="welcome-card">
        <h2>💼 매니저 활동 로그</h2>
        <p class="text-muted">매니저들의 권한 변경 및 시스템 제어 이력입니다.</p>
    </div>

    <div style="margin-top: 20px; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
        <form th:action="@{/manager/log/manager}" method="get" style="display: flex; gap: 8px; align-items: center;">
            <label style="font-size: 13px; color: #5c4d43; font-weight: bold;">📅 로그 아카이브 조회 :</label>
            <select name="logDate" class="manager-select">
                <option value="">오늘 실시간 로그 (Live)</option>
                <option th:each="date : ${archiveDates}"
                        th:value="${date}"
                        th:text="${date + ' 백업본'}"
                        th:selected="${date == selectedDate}">2026-06-01 백업본
                </option>
            </select>
            <button type="submit" class="btn-submit-yellow">조회</button>
        </form>
    </div>

    <div class="log-table-container">
        <table class="log-table">
            <thead>
            <tr>
                <th style="width: 20%">로그 발생 시간</th>
                <th style="width: 15%">액션 유형</th>
                <th style="width: 65%">활동 내용 내역</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(logs)}" class="empty-row">
                <td colspan="3">기록된 매니저 활동 데이터가 없습니다.</td>
            </tr>
            <tr th:each="log : ${logs}">
                <td th:text="${log.timestamp}" class="text-secondary">date</td>
                <td><span class="badge-manager" th:text="${log.thread}">[action]</span></td>
                <td th:text="${log.message}" class="log-msg-bold">msg</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
