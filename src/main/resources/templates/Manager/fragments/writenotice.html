<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/fragments.css}">
</head>
<body>

<main th:fragment="writeNoticeContent" class="manager-center-view">

    <div class="welcome-card">
        <h2>📢 새 전체 공지 작성</h2>
        <p>모든 사용자에게 노출될 팝업 공지사항을 작성하고 만료일을 설정합니다.</p>

        <div th:if="${successMessage}" style="background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 12px; border-radius: 4px; margin-bottom: 20px; text-align: left;">
            <strong th:text="${successMessage}">공지가 등록되었습니다.</strong>
        </div>

        <form th:action="@{/manager/notice/save}" method="post" style="margin-top: 20px;">

            <div style="margin-bottom: 15px; text-align: left;">
                <label for="title" style="display: block; font-weight: bold; margin-bottom: 6px; color: #333;">공지 제목</label>
                <input type="text" id="title" name="title" placeholder="팝업에 표시될 제목을 입력하세요" required
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem;">
            </div>

            <div style="margin-bottom: 15px; text-align: left;">
                <label for="content" style="display: block; font-weight: bold; margin-bottom: 6px; color: #333;">공지 내용</label>
                <textarea id="content" name="content" rows="6" placeholder="사용자에게 알릴 내용을 입력하세요" required
                          style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem; resize: vertical;"></textarea>
            </div>

            <div style="margin-bottom: 25px; text-align: left;">
                <label for="expiresAt" style="display: block; font-weight: bold; margin-bottom: 6px; color: #333;">만료 일시 (팝업 노출 종료 시간)</label>
                <input type="datetime-local" id="expiresAt" name="expiresAt" required
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem;">
            </div>

            <div style="text-align: right;">
                <button type="submit" style="padding: 10px 20px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background-color 0.2s;">
                    공지 등록하기
                </button>
            </div>

        </form>
    </div>
</main>

</body>
</html>
