<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<div th:fragment="writeNoticeContent" class="container-fluid">
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">새 전체 공지 작성</h6>
        </div>

        <div class="card-body">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}">공지가 등록되었습니다.</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/manager/notice/save}" method="post">

                <div class="mb-3">
                    <label for="title" class="form-label">공지 제목</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="팝업에 표시될 제목을 입력하세요" required>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">공지 내용</label>
                    <textarea class="form-control" id="content" name="content" rows="6" placeholder="사용자에게 알릴 내용을 입력하세요" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="expiresAt" class="form-label">만료 일시 (팝업 노출 종료 시간)</label>
                    <input type="datetime-local" class="form-control" id="expiresAt" name="expiresAt" required>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="submit" class="btn btn-primary">공지 등록하기</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
