<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<main th:fragment="logContent" class="manager-center-view">
    <div class="welcome-card" style="border-left: 4px solid #c53030; padding-left: 15px;">
        <h2 style="color: #c53030;">⚠️ 시스템 오류 로그</h2>
        <p class="text-muted">서버 내부 결함(500 에러) 및 크래시 예외 트레이스 이력입니다.</p>
    </div>

    <div style="margin-top: 20px; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
        <form th:action="@{/manager/log/error}" method="get" style="display: flex; gap: 8px; align-items: center;">
            <label style="font-size: 13px; color: #5c4d43; font-weight: bold;">📅 로그 아카이브 조회 :</label>
            <select name="logDate" class="manager-select">
                <option value="">오늘 실시간 로그 (Live)</option>
                <option th:each="date : ${archiveDates}"
                        th:value="${date}"
                        th:text="${date + ' 백업본'}"
                        th:selected="${date == selectedDate}">2026-06-01 백업본
                </option>
            </select>
            <button type="submit" class="btn-submit-yellow">조회</button>
        </form>
    </div>

    <div class="log-table-container">
        <table class="log-table">
            <thead>
            <tr>
                <th style="width: 18%">발생 시간</th>
                <th style="width: 12%">스레드</th>
                <th style="width: 8%">레벨</th>
                <th style="width: 17%">로거 위치</th>
                <th style="width: 45%">오류 상세 내용 및 예외문</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(logs)}" class="empty-row">
                <td colspan="5">서버 오류가 감지되지 않았습니다. 아주 깨끗합니다!</td>
            </tr>

            <tr th:each="log : ${logs}"
                th:classappend="${log.level != null and log.level.contains('ERROR')} ? 'error-row'">

                <th:block th:if="${log.level != null}">
                    <td th:text="${log.timestamp}" class="text-secondary">시간</td>
                    <td th:text="${log.thread}">스레드</td>
                    <td><span class="badge-error" th:text="${log.level}">ERROR</span></td>
                    <td th:text="${log.loggerName}">클래스 위치</td>
                    <td th:text="${log.message}" class="log-msg-bold">오류 내용 메시지</td>
                </th:block>

                <th:block th:if="${log.level == null}">
                    <td colspan="4" class="trace-caption">↳ Trace:</td>
                    <td th:text="${log.message}" class="trace-detail">java.lang.NullPointerException...</td>
                </th:block>

            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
