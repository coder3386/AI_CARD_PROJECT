# [\uB85C\uCEEC MariaDB \uC5F0\uACB0]
# localhost\uB294 \uB0B4 \uCEF4\uD4E8\uD130 OS\uC5D0\uC11C \uC2E4\uD589 \uC911\uC778 MariaDB \uC11C\uBE44\uC2A4\uB97C \uC758\uBBF8\uD569\uB2C8\uB2E4.
spring.datasource.url=jdbc:mariadb://localhost:3306/myapp?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=5310
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# [JPA/Hibernate \uC124\uC815]
# update: \uC5D4\uD2F0\uD2F0 \uD074\uB798\uC2A4 \uBCC0\uACBD \uC2DC \uD14C\uC774\uBE14 \uAD6C\uC870\uB97C \uC790\uB3D9\uC73C\uB85C \uBC18\uC601\uD569\uB2C8\uB2E4.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
logging.level.org.hibernate.orm.jdbc.bind=trace
# \uAC1C\uBC1C \uD3B8\uC758\uB97C \uC704\uD574 \uD0C0\uC784\uB9AC\uD504 \uCE90\uC2DC \uD574\uC81C
spring.thymeleaf.cache=false