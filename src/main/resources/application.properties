spring.application.name=cardapp
# 1. \uC11C\uBC84 \uD3EC\uD2B8 \uBC0F \uACBD\uB85C \uC124\uC815
# \uC678\uBD80\uC5D0\uC11C \uC811\uC18D\uD560 \uB54C http://\uC8FC\uC18C/card \uB85C \uC811\uC18D\uD558\uAE30 \uC704\uD55C \uC124\uC815\uC785\uB2C8\uB2E4.
server.port=8080
server.servlet.context-path=/card
# Session timeout. If a duration suffix is not specified, seconds will be used.
server.servlet.session.timeout=3600
# 2. \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 (\uC911\uC694: localhost \uB300\uC2E0 \uB3C4\uCEE4 \uC11C\uBE44\uC2A4\uBA85 'db' \uC0AC\uC6A9)
#myapp\uC740 docker-compose\uC5D0\uC11C \uC124\uC815\uD55C MYSQL_DATABASE \uC774\uB984\uC785\uB2C8\uB2E4.
#spring.datasource.url=jdbc:mysql://db:3306/myapp?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
#spring.datasource.username=root
#spring.datasource.password=71603386
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# \uB85C\uCEEC \uD14C\uC2A4\uD2B8\uC6A9 \uBA54\uBAA8\uB9AC \uB370\uC774\uD130\uBCA0\uC774\uC2A4\uC784 \uC2E4\uC81C \uBC30\uD3EC\uC2DC\uC5D0 \uC704\uC5D0\uAC70 \uC8FC\uC11D \uD574\uC81C \uD558\uACE0 \uC774\uAC74 \uC8FC\uC11D\uCC98\uB9AC\uD558\uC148
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 3. JPA/Hibernate \uC124\uC815
# \uC11C\uBC84 \uC2E4\uD589 \uC2DC \uC5D4\uD2F0\uD2F0(Entity) \uD074\uB798\uC2A4\uB97C \uBC14\uD0D5\uC73C\uB85C \uD14C\uC774\uBE14\uC744 \uC790\uB3D9\uC73C\uB85C \uC0DD\uC131/\uC5C5\uB370\uC774\uD2B8\uD569\uB2C8\uB2E4.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 4. \uD0C0\uC784\uB9AC\uD504(Thymeleaf) \uC124\uC815
# \uAC1C\uBC1C \uC911\uC5D0 HTML\uC744 \uC218\uC815\uD558\uACE0 \uBC14\uB85C \uD655\uC778\uD558\uAE30 \uC704\uD574 \uCE90\uC2DC\uB97C \uB055\uB2C8\uB2E4.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
#\uB85C\uADF8
logging.level=debug
logging.level.AIcard.cardapp=debug
#\uC5D0\uB7EC\uD398\uC774\uC9C0 \uACBD\uB85C \uC9C0\uC815
server.error.path=/error
# 404 \uC5D0\uB7EC\uB97C \uC2A4\uD504\uB9C1 \uB0B4\uBD80 \uC608\uC678\uB85C \uB358\uC9C0\uAC8C \uD568 (\uADF8\uB798\uC57C \uCEE8\uD2B8\uB864\uB7EC\uAC00 \uC7A1\uC74C)
spring.mvc.throw-exception-if-no-handler-found=true
# \uC815\uC801 \uB9AC\uC18C\uC2A4 \uD578\uB4E4\uB9C1 \uC2DC \uC5D0\uB7EC \uD398\uC774\uC9C0\uB85C \uB118\uC5B4\uAC00\uB3C4\uB85D \uC124\uC815
spring.web.resources.add-mappings=true

# AI card MVP settings
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-5.4-mini
app.generated-card-dir=generated-cards

